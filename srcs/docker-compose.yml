# Create the instance (containers) of the images/
services:
    mariadb:
        build: 
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        ports:
            - "3306:3306"
        container_name: mariadb
        networks:
            - inception_network
        restart: unless-stopped
        volumes:
            - db:/var/lib/mysql
        env_file: .env
    
    wordpress:
        build: 
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        ports:
            - "9000"
        container_name: wordpress
        networks:
            - inception_network
        restart: unless-stopped
        depends_on:
            - mariadb
        volumes:
            - wordpress_volume:/var/www/html
        env_file: .env
    nginx:
        build: 
            context: ./requirements/nginx
            dockerfile: Dockerfile
        ports:
            - "443:443"
        container_name: nginx
        networks:
            - inception_network
        restart: unless-stopped
        depends_on:
            - wordpress
        environment:
            - DOMAIN_NAME=${DOMAIN_NAME}
        volumes:
            - wordpress_volume:/var/www/html

networks:
    inception_network:
        driver: bridge

# Create the volumes
volumes:
    db:
        driver: local
        driver_opts:
            type: none
            device: /home/ifounas/data/mariadb
            o: bind
    wordpress_volume:
        driver: local
        driver_opts:
            type: none
            device: /home/ifounas/data/wordpress
            o: bind