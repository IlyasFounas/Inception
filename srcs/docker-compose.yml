# Create the instance (containers) of the images/
services:
    mariadb:
        build: 
            context: ./requirements/mariadb
            dockerfile: Dockerfile
        image: mariadb
        container_name: mariadb
        networks:
            - inception_network
        restart: unless-stopped
        volumes:
            - db:/var/lib/mysql
        environment:
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    
    wordpress:
        build: 
            context: ./requirements/wordpress
            dockerfile: Dockerfile
        image: wordpress
        container_name: wordpress
        networks:
            - inception_network
        restart: unless-stopped
        depends_on:
            - mariadb
        volumes:
            - wordpress_volume:/var/www/html
        environment:
            DOMAIN_NAME: ${DOMAIN_NAME}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            WORDPRESS_USER: ${WORDPRESS_USER}
            WORDPRESS_USER_PWD: ${WORDPRESS_USER_PWD}
            WORDPRESS_ROOT: ${WORDPRESS_ROOT}
            WP_TITLE: ${WP_TITLE}
            WP_ADMIN_USER: ${WP_ADMIN_USER}
            WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
            WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    nginx:
        build: 
            context: ./requirements/nginx
            dockerfile: Dockerfile
        ports:
            - "443:443"
        image: nginx
        container_name: nginx
        networks:
            - inception_network
        restart: unless-stopped
        depends_on:
            - wordpress
        environment:
            - DOMAIN_NAME=${DOMAIN_NAME}
        volumes:
            - wordpress_volume:/var/www/html

networks:
    inception_network:
        driver: bridge

# Create the volumes
volumes:
    db:
        driver: local
        driver_opts:
            type: none
            device: /home/ifounas/data/mariadb
            o: bind
    wordpress_volume:
        driver: local
        driver_opts:
            type: none
            device: /home/ifounas/data/wordpress
            o: bind